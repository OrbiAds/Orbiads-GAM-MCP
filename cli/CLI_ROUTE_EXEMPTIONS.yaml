# Routes intentionally NOT covered by dedicated CLI commands.
# Each entry must include a `reason`. The migration-gate test reads this file.

exemptions:
  - path: POST /api/gam/inventory/understanding/jobs
    reason: >
      Story 71.1 backend-only dark async endpoint. CLI continues to use the
      synchronous inventory understanding analyze/get commands until the
      EventSource/polling client work ships in Story 71.3.
  - path: GET /api/gam/inventory/understanding/jobs/{job_id}
    reason: >
      Story 71.1 backend-only dark async endpoint. CLI continues to use the
      synchronous inventory understanding analyze/get commands until the
      EventSource/polling client work ships in Story 71.3.
  - path: POST /api/gam/jobs
    reason: "Epic 82 async job enqueue - CLI continues using sync commands until polling is implemented"
  - path: GET /api/gam/jobs/{job_id}
    reason: "Epic 82 async job poll - CLI continues using sync commands until polling is implemented"
  - path: POST /api/gam/inventory/blueprint/{blueprint_id}/migrate-v2
    reason: >
      Story 91.6 one-shot persisted blueprint schema migration endpoint. CLI
      authoring remains on the existing blueprint parent surface until the
      Blueprint V2 builder and read-only MCP/CLI story ships.
  - path: GET /api/gam/inventory/export
    reason: >
      Internal export endpoint for inventory data (CSV/XLSX). Served through
      the inventory parent MCP tool; no dedicated CLI verb planned until
      an inventory-export story is scoped.
  - path: POST /api/gam/audience-segments/segment-population/action
    reason: >
      Audience segment population action endpoint (REST batch operation).
      Covered via the audiences parent>child MCP tool; CLI parity deferred
      to the Epic 68 migration close-out story.
  - path: POST /api/gam/audience-segments/segment-population/memberships
    reason: >
      Audience segment population memberships endpoint (REST batch operation).
      Covered via the audiences parent>child MCP tool; CLI parity deferred
      to the Epic 68 migration close-out story.
  - path: POST /api/gam/audience-segments/segment-population/results
    reason: >
      Audience segment population results endpoint (REST batch query).
      Covered via the audiences parent>child MCP tool; CLI parity deferred
      to the Epic 68 migration close-out story.
  - path: POST /api/gam/creatives/upload/register-hosted
    reason: >
      Hosted creative registration endpoint for in-flight upload workflow.
      Covered via the creatives parent>child MCP tool; no standalone CLI
      verb planned until the hosted-creative upload CLI story ships.
  - path: POST /api/gam/inventory/import
    reason: >
      Inventory import endpoint for bulk ingestion. Covered via the inventory
      parent>child MCP tool; CLI parity deferred to the Epic 71 async-job
      CLI story.
  - path: GET /api/gam/reports/history
    reason: >
      Epic 102 server-side branded-report history list. Web/UI-only feature
      (in-app report history panel); no CLI use case planned. Report generation
      and catalogue stay on the reporting parent + `reporting` CLI verbs.
  - path: POST /api/gam/reporting/preview-kpis
    reason: >
      Epic 102 non-blocking branded-report KPI preview shown in the web report
      builder before generation. Web/UI-only feature; no CLI use case planned.
