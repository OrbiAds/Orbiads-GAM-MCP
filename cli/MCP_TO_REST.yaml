#   rest:   "<METHOD> <path>"  | "NO-REST"   (our FastAPI layer, NOT GAM SOAP/REST)
#   cli:    "<noun> <verb>"     | null         (an EXISTING working CLI command)
#   exempt: "<reason>"          | absent        (intentionally out of parity scope)
#
# Status is DERIVED by the generator (FULL / REST-ONLY / MCP-ONLY / EXEMPT).
# Do not hardcode counts anywhere — parity-matrix.json is the single source of truth.
